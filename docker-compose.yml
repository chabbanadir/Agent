services:
  # ─── Migration (runs once, pushes schema, then exits) ─────────────────────
  migrate:
    build:
      context: .
      dockerfile: Dockerfile.migrate
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/agent_db
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
    networks:
      - internal

  # ─── App ──────────────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/agent_db
      - REDIS_URL=redis://redis:6379
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXTAUTH_URL=http://127.0.0.1:3000
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      # ── LLM providers — fill at least ONE of these ──────────────
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL}
      - GMAIL_PUBSUB_TOPIC=${GMAIL_PUBSUB_TOPIC}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_started
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - internal

  # ─── Database ─────────────────────────────────────────────────────────────
  db:
    image: ankane/pgvector
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=agent_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d agent_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - internal

  # ─── Redis ────────────────────────────────────────────────────────────────
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    networks:
      - internal

networks:
  internal:

volumes:
  postgres_data:
